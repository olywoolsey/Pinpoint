# pytest.dev.ini
[pytest]
minversion = 6.0

# Verbose output for development
addopts = -v --tb=short --strict-markers 
testpaths = tests
markers =
    crud: mark a test as a crud test.
    users: mark a test as a user test.
    plans: mark test as related to plans.
    routes: route calculation tests.
    friendships: tests for friendship functionality.
    
    actions: mark a test as an action test.
    content: mark a test as a content test.
    auth: mark a test as an auth test.
