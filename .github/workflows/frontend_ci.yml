name: Frontend CI

on:
  pull_request:
    branches:
      - Sprint3
      - main
  push:
    branches:
      - Testing/140/DockerizeBackFrontend
      - Sprint3
      - main

jobs:
  build_and_test_frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install frontend dependencies
        run: |
          cd frontend/
          npm install
          
      - name: Run Frontend Tests
        run: |
          cd frontend/
          npm run test:ci
      
      - name: Display Frontend Test Results
        run: |
          cd frontend/
          cat junit.xml
          mv junit.xml ../frontend_test_results.xml
          
      - name: Upload Frontend Test Results
        uses: actions/upload-artifact@v3
        with:
          name: frontend-unittest-results
          path: frontend_test_results.xml

      - name: Cleanup
        run: rm -rf node_modules
